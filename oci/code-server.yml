services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: always
    user: "1000:1000"
    ports:
      - "18080:8080"
    volumes:
      - /data/docker/code-server/local:/home/coder/.local
      - /data/docker/code-server/config:/home/coder/.config
      - /data/docker/code-server/project:/home/coder/project
