services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: always
    ports:
      - "18789:18789"
    volumes:
      - /data/docker/openclaw/home:/home/node
      - /data/docker/code-server/project:/home/node/shared/code-server/project
      - /data/docker/n8n/data:/home/node/shared/n8n
      - /var/run/docker.sock:/var/run/docker.sock

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    profiles:
      - tools
    stdin_open: true
    tty: true
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    volumes:
      - /data/docker/openclaw/home:/home/node
      - /data/docker/code-server/project:/home/node/shared/code-server/project
      - /data/docker/n8n/data:/home/node/shared/n8n
      - /var/run/docker.sock:/var/run/docker.sock
