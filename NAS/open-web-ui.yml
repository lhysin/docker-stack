version: '3.9'

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: always
    environment:
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL}"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
      TZ: "${TZ}"
    ports:
      - "3300:8080"
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  openwebui_data:
    driver: local
    driver_opts:
      type: none
      device: /volume1/docker/openwebui/data
      o: bind